# Redis configuration for Agent System

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Memory Management
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence (AOF for durability)
appendonly yes
appendfsync everysec
appendfilename "appendonly.aof"

# RDB snapshots
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb

# Logging
loglevel notice
logfile ""

# Client handling
timeout 0
tcp-keepalive 300
maxclients 1000

# Pub/Sub
# Allow large messages for streaming responses
client-output-buffer-limit pubsub 64mb 32mb 60

# Streams configuration
# Used for event storage and catch-up
stream-node-max-bytes 4096
stream-node-max-entries 100

# Lua scripting timeout (ms)
lua-time-limit 5000

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Active defragmentation
activedefrag yes
active-defrag-ignore-bytes 100mb
active-defrag-threshold-lower 10
active-defrag-threshold-upper 50

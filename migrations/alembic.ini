# Alembic Configuration

[alembic]
# Path to migration scripts
script_location = migrations

# Template used to generate migration files
file_template = %%(rev)s_%%(slug)s

# Truncate slug to avoid exceeding filesystem limits
truncate_slug_length = 40

# Set to true to use version tables from different schemas
version_path_separator = os

# Set to 'true' to run migrations in an offline mode
offline = false

# SQLAlchemy URL - overridden by env.py
sqlalchemy.url = postgresql+asyncpg://agent:agent_secret@localhost:5432/agent_db

[post_write_hooks]
# Run after migration file generation
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = REVISION_SCRIPT_FILENAME

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
